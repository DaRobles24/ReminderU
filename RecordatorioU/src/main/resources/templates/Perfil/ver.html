<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mi Perfil - ReminderU</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/styles.css}">
        <style>
            .profile-container {
                max-width: 600px;
                margin: 2rem auto;
            }

            .profile-card {
                background-color: #fff;
                border-radius: 1rem;
                border: 1px solid rgba(219, 234, 254, 1);
                padding: 2rem;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            }

            .profile-header {
                text-align: center;
                padding-bottom: 1.5rem;
                border-bottom: 2px solid #e0e0e0;
            }

            .profile-img {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                border: 3px solid #3b82f6;
                object-fit: cover;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
                margin-bottom: 1rem;
            }

            .profile-name {
                font-size: 1.75rem;
                font-weight: bold;
                color: #374151;
                margin-bottom: 0.25rem;
            }

            .profile-role {
                color: #6b7280;
                font-size: 0.9rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .profile-body {
                padding-top: 1.5rem;
            }

            .info-item {
                padding: 1rem;
                margin-bottom: 0.75rem;
                background-color: #f9fafb;
                border-radius: 0.5rem;
                border-left: 4px solid #3b82f6;
            }

            .info-label {
                font-weight: 600;
                color: #6b7280;
                font-size: 0.85rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 0.25rem;
            }

            .info-value {
                font-size: 1rem;
                color: #374151;
                font-weight: 500;
            }

            .btn-edit-profile {
                background-color: #3b82f6;
                color: #fff;
                border: none;
                padding: 0.75rem 2rem;
                border-radius: 0.5rem;
                font-weight: 600;
                text-decoration: none;
                display: inline-block;
                transition: background 0.2s;
                width: 100%;
                text-align: center;
                margin-top: 1rem;
            }

            .btn-edit-profile:hover {
                background-color: #2563eb;
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div th:replace="~{fragments/header :: HeaderPagina}"></div>

        <main>
            <div class="profile-container">
                <div class="profile-card">
                    <!-- Header del perfil -->
                    <div class="profile-header">
                        <!-- Foto de Google (URL externa) -->
                        <img th:if="${usuario.fotoPerfil != null && usuario.fotoPerfil.startsWith('http')}" 
                             th:src="${usuario.fotoPerfil}" 
                             alt="Foto de perfil" 
                             class="profile-img"/>

                        <!-- Foto local (desde servidor) -->
                        <img th:if="${usuario.fotoPerfil != null && !usuario.fotoPerfil.startsWith('http')}" 
                             th:src="@{${usuario.fotoPerfil}}" 
                             alt="Foto de perfil" 
                             class="profile-img"/>

                        <!-- Sin foto -->
                        <img th:if="${usuario.fotoPerfil == null}" 
                             src="https://via.placeholder.com/120" 
                             alt="Sin foto" 
                             class="profile-img"/>

                        <div class="profile-name" th:text="${usuario.nombre + ' ' + usuario.apellido}">
                            Nombre Usuario
                        </div>
                        <div class="profile-role" th:text="${usuario.rol}">USER</div>
                    </div>

                    <!-- Información del perfil -->
                    <div class="profile-body">
                        <div class="info-item">
                            <div class="info-label">Correo Electrónico</div>
                            <div class="info-value" th:text="${usuario.email}">correo@ejemplo.com</div>
                        </div>

                        <div class="info-item" th:if="${usuario.cedula}">
                            <div class="info-label">Cédula</div>
                            <div class="info-value" th:text="${usuario.cedula}">123456789</div>
                        </div>

                        <div class="info-item" th:if="${usuario.carrera}">
                            <div class="info-label">Carrera</div>
                            <div class="info-value" th:text="${usuario.carrera}">Ingeniería</div>
                        </div>


                        <!-- Botón editar -->
                        <a th:href="@{/perfil/editar}" class="btn-edit-profile">
                            Editar Perfil
                        </a>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="~{fragments/footer :: FooterPagina}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
