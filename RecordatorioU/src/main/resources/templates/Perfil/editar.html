<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Editar Perfil - ReminderU</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/styles.css}">
        <style>
            .edit-container {
                max-width: 600px;
                margin: 2rem auto;
            }

            .edit-card {
                background-color: #fff;
                border-radius: 1rem;
                border: 1px solid rgba(219, 234, 254, 1);
                padding: 2rem;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            }

            .edit-header {
                text-align: center;
                padding-bottom: 1.5rem;
                border-bottom: 2px solid #e0e0e0;
                margin-bottom: 1.5rem;
            }

            .edit-header h2 {
                font-size: 1.75rem;
                font-weight: bold;
                color: #374151;
                margin: 0;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            .form-label {
                font-weight: 600;
                color: #374151;
                font-size: 0.9rem;
                margin-bottom: 0.5rem;
                display: block;
            }

            .form-control {
                border: 1px solid #d1d5db;
                border-radius: 0.5rem;
                padding: 0.75rem;
                font-size: 1rem;
                transition: border-color 0.2s;
            }

            .form-control:focus {
                border-color: #3b82f6;
                outline: none;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            }

            .current-photo {
                text-align: center;
                margin: 1.5rem 0;
            }

            .current-photo img {
                width: 100px;
                height: 100px;
                border-radius: 50%;
                border: 3px solid #3b82f6;
                object-fit: cover;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            }

            .current-photo p {
                margin-top: 0.5rem;
                color: #6b7280;
                font-size: 0.85rem;
            }

            .form-actions {
                display: flex;
                gap: 1rem;
                margin-top: 2rem;
            }

            .btn-save {
                background-color: #3b82f6;
                color: #fff;
                border: none;
                padding: 0.75rem 2rem;
                border-radius: 0.5rem;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s;
                flex: 1;
            }

            .btn-save:hover {
                background-color: #2563eb;
            }

            .btn-cancel {
                background-color: #6b7280;
                color: #fff;
                border: none;
                padding: 0.75rem 2rem;
                border-radius: 0.5rem;
                font-weight: 600;
                text-decoration: none;
                display: inline-block;
                text-align: center;
                transition: background 0.2s;
                flex: 1;
            }

            .btn-cancel:hover {
                background-color: #4b5563;
                color: #fff;
            }

            .alert-success {
                background-color: #d1fae5;
                border: 1px solid #6ee7b7;
                color: #065f46;
                padding: 1rem;
                border-radius: 0.5rem;
                margin-bottom: 1.5rem;
            }

            .alert-danger {
                background-color: #fee2e2;
                border: 1px solid #fca5a5;
                color: #991b1b;
                padding: 1rem;
                border-radius: 0.5rem;
                margin-bottom: 1.5rem;
            }
        </style>
    </head>
    <body>
        <div th:replace="~{fragments/header :: HeaderPagina}"></div>

        <main>
            <div class="edit-container">
                <div class="edit-card">
                    <div class="edit-header">
                        <h2>Editar Perfil</h2>
                    </div>

                    <!-- Mensajes de éxito/error -->
                    <div th:if="${param.success}" class="alert-success">
                        ✓ Perfil actualizado correctamente
                    </div>

                    <div th:if="${error}" class="alert-danger">
                        <span th:text="${error}"></span>
                    </div>

                    <!-- Foto actual -->
                    <div class="current-photo">
                        <!-- Foto de Google -->
                        <img th:if="${usuario.fotoPerfil != null && usuario.fotoPerfil.startsWith('http')}" 
                             th:src="${usuario.fotoPerfil}" 
                             alt="Foto actual"/>

                        <!-- Foto local -->
                        <img th:if="${usuario.fotoPerfil != null && !usuario.fotoPerfil.startsWith('http')}" 
                             th:src="@{${usuario.fotoPerfil}}" 
                             alt="Foto actual"/>

                        <!-- Sin foto -->
                        <img th:if="${usuario.fotoPerfil == null}" 
                             src="https://via.placeholder.com/100" 
                             alt="Sin foto"/>
                        <p>Foto de perfil actual</p>
                    </div>

                    <!-- Formulario -->
                    <form th:action="@{/perfil/editar}" 
                          th:object="${usuario}" 
                          method="post" 
                          enctype="multipart/form-data">

                        <!-- Campo oculto para ID -->
                        <input type="hidden" th:field="*{idUsuario}"/>

                        <!-- Nombre -->
                        <div class="form-group">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" 
                                   class="form-control" 
                                   id="nombre" 
                                   th:field="*{nombre}" 
                                   required/>
                        </div>

                        <!-- Apellido -->
                        <div class="form-group">
                            <label for="apellido" class="form-label">Apellido</label>
                            <input type="text" 
                                   class="form-control" 
                                   id="apellido" 
                                   th:field="*{apellido}" 
                                   required/>
                        </div>

                        <!-- Email (solo lectura) -->
                        <div class="form-group">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" 
                                   class="form-control" 
                                   id="email" 
                                   th:field="*{email}" 
                                   readonly 
                                   style="background-color: #f3f4f6;"/>
                            <small style="color: #6b7280; font-size: 0.8rem;">El correo no se puede modificar</small>
                        </div>

                        <!-- Cédula (solo lectura si existe) -->
                        <div class="form-group">
                            <label for="cedula" class="form-label">Cédula</label>
                            <input type="text" 
                                   class="form-control" 
                                   id="cedula" 
                                   th:field="*{cedula}" 
                                   readonly 
                                   style="background-color: #f3f4f6;"/>
                            <small style="color: #6b7280; font-size: 0.8rem;">La cédula no se puede modificar</small>
                        </div>

                        <!-- Carrera -->
                        <div class="form-group">
                            <label for="carrera" class="form-label">Carrera</label>
                            <input type="text" 
                                   class="form-control" 
                                   id="carrera" 
                                   th:field="*{carrera}" 
                                   placeholder="Ej: Ingeniería en Sistemas"/>
                        </div>

                        <!-- Foto de perfil -->
                        <div class="form-group">
                            <label for="foto" class="form-label">Cambiar Foto de Perfil</label>
                            <input type="file" 
                                   class="form-control" 
                                   id="foto" 
                                   name="foto" 
                                   accept="image/*"/>
                            <small style="color: #6b7280; font-size: 0.8rem;">Formatos: JPG, PNG, GIF (máx. 5MB)</small>
                        </div>

                        <!-- Botones -->
                        <div class="form-actions">
                            <button type="submit" class="btn-save">
                                Guardar Cambios
                            </button>
                            <a th:href="@{/perfil/ver}" class="btn-cancel">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <div th:replace="~{fragments/footer :: FooterPagina}"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
