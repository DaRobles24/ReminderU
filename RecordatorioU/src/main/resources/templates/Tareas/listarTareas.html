<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReminderU — Mis Tareas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/estilos.css(v=${#dates.createNow().time})}" href="/css/estilos.css">

  <style>
    .page-body { padding: 0 1rem 3rem; max-width: 1100px; margin: 0 auto; }
    @media (min-width: 768px) { .page-body { padding: 0 1.5rem 3rem; } }

    /* Page header */
    .page-header {
      padding: 2rem 0 1.5rem;
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .page-header h1 { font-size: clamp(1.4rem,3.5vw,1.9rem); font-weight: 800; letter-spacing:-.4px; }
    .page-header p  { font-size:.9rem; color:var(--navy-muted); margin-top:.25rem; }

    /* Section label */
    .section-label {
      font-size:.72rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; color:var(--navy-muted); margin-bottom:.9rem;
    }

    /* Course accordion */
    .curso-accordion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: .75rem;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .curso-accordion:hover { box-shadow: var(--shadow-md); }

    .curso-accordion-header {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      user-select: none;
      background: transparent;
      border: none; width: 100%; text-align: left;
      transition: background .15s;
    }
    .curso-accordion-header:hover { background: var(--bg); }
    .curso-accordion-header.open { background: var(--bg); }

    .curso-acc-stripe {
      width: 4px; height: 36px; border-radius: 3px;
      background: var(--indigo); flex-shrink: 0;
    }
    .curso-acc-stripe.presencial { background: var(--emerald); }

    .curso-acc-name { font-size: .95rem; font-weight: 700; flex: 1; }
    .curso-acc-count { font-size: .78rem; color: var(--navy-muted); white-space: nowrap; }
    .curso-acc-chevron {
      font-size: .8rem; color: var(--navy-muted);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .curso-accordion-header.open .curso-acc-chevron { transform: rotate(180deg); }

    .curso-accordion-body {
      display: none; padding: 0 1.25rem 1rem;
    }
    .curso-accordion-body.open { display: block; }

    /* Tarea row */
    .tarea-item {
      display: flex; align-items: center; gap: .85rem;
      padding: .75rem .9rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
      margin-bottom: .4rem;
      transition: var(--transition);
    }
    .tarea-item:hover { background: #f1f5f9; }
    .tarea-item.entregada { opacity: .55; }

    .tarea-check {
      width: 18px; height: 18px; border-radius: 5px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: .65rem;
      background: var(--surface);
    }
    .tarea-check.done { background: var(--emerald); border-color: var(--emerald); color: #fff; }

    .tarea-title { font-size: .88rem; font-weight: 600; flex: 1; min-width: 0; }
    .tarea-title.done { text-decoration: line-through; }

    .tarea-fecha {
      font-size: .74rem; color: var(--navy-muted);
      white-space: nowrap;
    }
    .tarea-urgente { color: var(--rose); font-weight: 700; }
    .tarea-proxima { color: var(--amber); font-weight: 700; }

    .tarea-actions { display: flex; gap: .35rem; flex-shrink: 0; }

    /* Filter tabs */
    .filter-tabs {
      display: flex; gap: .5rem; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-tab {
      padding: .4rem 1rem; border-radius: 50px;
      font-size: .8rem; font-weight: 600;
      cursor: pointer; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--navy-muted);
      transition: var(--transition);
    }
    .filter-tab.active {
      background: var(--indigo); color: #fff; border-color: var(--indigo);
    }
    .filter-tab:hover:not(.active) { border-color: var(--border-hover); color: var(--navy); }
  </style>
</head>

<body>
  <div th:replace="fragments/header :: HeaderPagina"></div>

  <main>
    <div class="page-body">

      <!-- Page header -->
      <div class="page-header">
        <div>
          <h1>📋 Mis Tareas</h1>
          <p>Organizadas por curso · muestra pendientes y entregadas</p>
        </div>
        <a th:href="@{/tareas/form}" class="ru-btn ru-btn-primary">+ Nueva tarea</a>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filtrar('todas', this)">Todas</button>
        <button class="filter-tab" onclick="filtrar('pendientes', this)">⏳ Pendientes</button>
        <button class="filter-tab" onclick="filtrar('entregadas', this)">✅ Entregadas</button>
      </div>

      <!-- ══ SECCIÓN: PENDIENTES ══ -->
      <div id="seccion-pendientes">
        <p class="section-label" th:if="${!#lists.isEmpty(cursosPendientes)}">⚡ Pendientes</p>

        <div th:if="${#lists.isEmpty(cursosPendientes)}" class="ru-empty mb-4">
          <div class="ru-empty-icon">🎉</div>
          <div class="ru-empty-title">¡Sin tareas pendientes!</div>
          <div class="ru-empty-text">Estás completamente al día.</div>
        </div>

        <!-- Acordeón por curso -->
        <div th:each="grupo : ${cursosPendientes}" class="curso-accordion" data-estado="pendiente">
          <button class="curso-accordion-header"
                  type="button"
                  th:attr="onclick='toggleAcc(this)'"
                  th:id="'acc-pend-' + ${grupo.curso.id}">
            <div class="curso-acc-stripe"
                 th:classappend="${grupo.curso.modalidad == 'PRESENCIAL'} ? 'presencial' : ''"></div>
            <span class="curso-acc-name" th:text="${grupo.curso.nombre}">Curso</span>
            <span class="curso-acc-count">
              <span th:text="${#lists.size(grupo.tareas)}">0</span> tarea(s)
            </span>
            <span class="ru-badge"
                  th:classappend="${grupo.curso.modalidad == 'PRESENCIAL'} ? 'ru-badge-emerald' : 'ru-badge-indigo'">
              <span th:text="${grupo.curso.modalidad == 'PRESENCIAL'} ? '🏫' : '🖥'"></span>
              <span th:text="${grupo.curso.modalidad}">—</span>
            </span>
            <span class="curso-acc-chevron">▼</span>
          </button>
          <div class="curso-accordion-body"
               th:id="'body-pend-' + ${grupo.curso.id}">
            <div th:each="tarea : ${grupo.tareas}" class="tarea-item">
              <div class="tarea-check">
                <!-- checkbox vacío = pendiente -->
              </div>
              <span class="tarea-title" th:text="${tarea.titulo}">Tarea</span>
              <span class="tarea-fecha"
                    th:classappend="${tarea.diasRestantes != null and tarea.diasRestantes <= 1} ? 'tarea-urgente' :
                                     (${tarea.diasRestantes != null and tarea.diasRestantes <= 3} ? 'tarea-proxima' : '')"
                    th:text="${#temporals.format(tarea.fechaEntrega, 'dd MMM')}">Fecha</span>
              <div class="tarea-actions">
                <a th:href="@{/tareas/ver/{id}(id=${tarea.id})}" class="ru-btn ru-btn-ghost ru-btn-sm">Ver</a>
                <a th:href="@{/tareas/entregar/{id}(id=${tarea.id})}"
                   class="ru-btn ru-btn-success ru-btn-sm"
                   onclick="return confirm('¿Marcar como entregada?')">✓ Entregar</a>
                <a th:href="@{/tareas/eliminar/{id}(id=${tarea.id})}"
                   class="ru-btn ru-btn-ghost ru-btn-sm"
                   style="color:var(--rose);"
                   onclick="return confirm('¿Eliminar tarea?')">✕</a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ══ SECCIÓN: ENTREGADAS ══ -->
      <div id="seccion-entregadas" class="mt-4">
        <p class="section-label" th:if="${!#lists.isEmpty(cursosEntregados)}">✅ Entregadas</p>

        <div th:each="grupo : ${cursosEntregados}" class="curso-accordion" data-estado="entregada">
          <button class="curso-accordion-header"
                  type="button"
                  th:attr="onclick='toggleAcc(this)'"
                  th:id="'acc-entr-' + ${grupo.curso.id}">
            <div class="curso-acc-stripe"
                 th:classappend="${grupo.curso.modalidad == 'PRESENCIAL'} ? 'presencial' : ''"></div>
            <span class="curso-acc-name" th:text="${grupo.curso.nombre}">Curso</span>
            <span class="curso-acc-count">
              <span th:text="${#lists.size(grupo.tareas)}">0</span> entregada(s)
            </span>
            <span class="curso-acc-chevron">▼</span>
          </button>
          <div class="curso-accordion-body"
               th:id="'body-entr-' + ${grupo.curso.id}">
            <div th:each="tarea : ${grupo.tareas}" class="tarea-item entregada">
              <div class="tarea-check done">✓</div>
              <span class="tarea-title done" th:text="${tarea.titulo}">Tarea</span>
              <span class="tarea-fecha"
                    th:text="${#temporals.format(tarea.fechaEntrega, 'dd MMM')}">Fecha</span>
              <div class="tarea-actions">
                <a th:href="@{/tareas/ver/{id}(id=${tarea.id})}" class="ru-btn ru-btn-ghost ru-btn-sm">Ver</a>
                <a th:href="@{/tareas/eliminar/{id}(id=${tarea.id})}"
                   class="ru-btn ru-btn-ghost ru-btn-sm"
                   style="color:var(--rose);"
                   onclick="return confirm('¿Eliminar tarea?')">✕</a>
              </div>
            </div>
          </div>
        </div>

        <div th:if="${#lists.isEmpty(cursosEntregados)}" class="ru-empty">
          <div class="ru-empty-icon">📂</div>
          <div class="ru-empty-title">Sin tareas entregadas aún</div>
          <div class="ru-empty-text">Las tareas completadas aparecerán aquí.</div>
        </div>
      </div>

    </div><!-- /page-body -->
  </main>

  <div th:replace="fragments/footer :: FooterPagina"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleAcc(btn) {
      btn.classList.toggle('open');
      var bodyId = btn.id.replace('acc-pend-','body-pend-').replace('acc-entr-','body-entr-');
      var body = document.getElementById(bodyId);
      if(body) body.classList.toggle('open');
    }

    function filtrar(tipo, tab) {
      // Update active tab
      document.querySelectorAll('.filter-tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');

      var pend = document.getElementById('seccion-pendientes');
      var entr = document.getElementById('seccion-entregadas');

      if(tipo === 'todas') {
        pend.style.display = ''; entr.style.display = '';
      } else if(tipo === 'pendientes') {
        pend.style.display = ''; entr.style.display = 'none';
      } else {
        pend.style.display = 'none'; entr.style.display = '';
      }
    }
  </script>
</body>
</html>
