<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lista de Tareas</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
        <style>
            /* ========================== */
            /* ESTILOS GENERALES DEL BODY */
            /* ========================== */
            html, body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
            body {
                display: flex;
                flex-direction: column;
                font-family: Arial, sans-serif;
                background-color: #f0f2f5;
            }
            main {
                flex: 1;
                padding: 20px;
            }

            /* ========================== */
            /* HEADER DE TAREAS */
            /* ========================== */
            .tareas-header {
                margin-bottom: 2rem;
            }
            .tareas-title {
                font-size: 2.5rem;
                font-weight: bold;
                color: #374151;
                margin-bottom: 0.5rem;
            }
            .tareas-subtitle {
                color: #6b7280;
                font-size: 1.1rem;
            }

            /* ========================== */
            /* CARDS DE TAREAS */
            /* ========================== */
            .cards-row {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1.5rem;
                margin-top: 2rem;
            }
            .cards-col {
                flex: 1 1 300px;
                max-width: 400px;
                animation: fadeInUp 0.5s ease forwards;
            }
            .cards-col:nth-child(2) {
                animation-delay: 0.1s;
            }
            .cards-col:nth-child(3) {
                animation-delay: 0.2s;
            }
            .cards-col:nth-child(4) {
                animation-delay: 0.3s;
            }

            .custom-card {
                background-color: #fff;
                border-radius: 1rem;
                border: 1px solid rgba(219, 234, 254, 1);
                padding: 1.5rem;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
                transition: transform 0.2s, box-shadow 0.2s;
                height: 100%;
                display: flex;
                flex-direction: column;
            }
            .custom-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            }

            /* HEADER DE CARD */
            .custom-card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                gap: 1rem;
                margin-bottom: 1rem;
            }
            .task-title {
                font-weight: 600;
                color: #374151;
                font-size: 1.2rem;
                margin: 0;
                flex: 1;
            }

            /* ESTADO DE TAREA */
            .task-status-badge {
                padding: 0.5rem 1rem;
                border-radius: 0.5rem;
                font-weight: 600;
                font-size: 0.8rem;
                text-transform: uppercase;
                white-space: nowrap;
            }
            .ENTREGADA {
                background-color: #10b981;
                color: white;
            }
            .PENDIENTE {
                background-color: #f59e0b;
                color: white;
            }
            .ATRASADA {
                background-color: #ef4444;
                color: white;
            }

            /* SEPARADOR */
            .separador-card {
                border: 0;
                border-top: 2px solid #e0e0e0;
                margin: 1rem 0;
            }

            /* DETALLES DE LA TAREA */
            .task-details {
                flex: 1;
                margin-bottom: 1rem;
            }
            .task-detail {
                margin-bottom: 0.8rem;
                color: #6b7280;
                font-size: 0.95rem;
            }
            .task-detail strong {
                color: #374151;
            }
            .task-detail i {
                width: 16px;
                margin-right: 0.5rem;
                color: #3b82f6;
            }

            .tiempo-restante {
                background-color: #3b82f6;
                color: white;
                padding: 1rem;
                border-radius: 0.5rem;
                text-align: center;
                margin: 1rem 0;
                font-weight: 600;
            }
            .tiempo-restante i {
                margin-right: 0.5rem;
            }

            /* ACCIONES */
            .custom-card-actions {
                margin-top: auto;
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }
            .custom-card-btn {
                border: none;
                padding: 0.75rem 1rem;
                border-radius: 0.5rem;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.2s;
                text-decoration: none;
                text-align: center;
                font-size: 0.9rem;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }
            .btn-ver {
                background-color: #3b82f6;
                color: #fff;
            }
            .btn-ver:hover {
                background-color: #2563eb;
                transform: translateY(-1px);
            }
            .btn-editar {
                background-color: #f59e0b;
                color: #fff;
            }
            .btn-editar:hover {
                background-color: #d97706;
                transform: translateY(-1px);
            }
            .btn-eliminar {
                background-color: #ef4444;
                color: #fff;
            }
            .btn-eliminar:hover {
                background-color: #dc2626;
                transform: translateY(-1px);
            }

            /* VACÍO */
            .empty-state {
                text-align: center;
                padding: 4rem 2rem;
                background: white;
                border-radius: 1rem;
                border: 1px solid rgba(219, 234, 254, 1);
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
                margin: 2rem 0;
            }
            .empty-state i {
                font-size: 4rem;
                color: #d1d5db;
                margin-bottom: 1rem;
            }
            .empty-state h3 {
                color: #374151;
                margin-bottom: 0.5rem;
            }
            .empty-state p {
                color: #6b7280;
            }

            /* BOTÓN FLOTANTE */
            .floating-add-btn {
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background-color: #3b82f6;
                color: white;
                border: none;
                font-size: 1.5rem;
                box-shadow: 0 4px 8px rgba(0,0,0,0.15);
                transition: all 0.3s ease;
                z-index: 1000;
            }
            .floating-add-btn:hover {
                background-color: #2563eb;
                transform: scale(1.1);
                box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            }

            /* ANIMACIONES */
            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* RESPONSIVE */
            @media (max-width: 768px) {
                .tareas-title {
                    font-size: 2rem;
                }
                .custom-card {
                    padding: 1.2rem;
                }
                .floating-add-btn {
                    bottom: 1rem;
                    right: 1rem;
                    width: 50px;
                    height: 50px;
                    font-size: 1.2rem;
                }
                .custom-card-header {
                    flex-direction: column;
                    align-items: stretch;
                    gap: 0.5rem;
                }
                .task-status-badge {
                    align-self: flex-start;
                }
            }

            /* ACCESIBILIDAD */
            .custom-card-btn:focus {
                outline: 2px solid #3b82f6;
                outline-offset: 2px;
            }
            .floating-add-btn:focus {
                outline: 2px solid #3b82f6;
                outline-offset: 2px;
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <div th:replace="fragments/header :: header"></div>

        <main>
            <!-- Header de Tareas -->
            <div class="tareas-header">
                <h1 class="tareas-title">
                    <i class="fas fa-tasks" style="margin-right: 0.5rem; color: #3b82f6;"></i>
                    Tareas
                </h1>
                <p class="tareas-subtitle">Organiza y gestiona tus tareas académicas</p>
            </div>

            <!-- Estado Vacío -->
            <div th:if="${tareasConTiempo.isEmpty()}" class="empty-state">
                <i class="fas fa-clipboard-list"></i>
                <h3>No hay tareas disponibles</h3>
                <p>Cuando tengas tareas asignadas, aparecerán aquí.</p>
            </div>

            <!-- Grid de Tareas -->
            <div class="cards-row" th:if="${not #lists.isEmpty(tareasConTiempo)}">
                <div class="cards-col" th:each="mapa : ${tareasConTiempo}">
                    <div class="custom-card">
                        <!-- Header con título y estado -->
                        <div class="custom-card-header">
                            <h5 class="task-title" th:text="${mapa.tarea.titulo}">Título de la tarea</h5>
                            <span class="task-status-badge" th:classappend="${mapa.tarea.estado.name()}" th:text="${mapa.tarea.estado}">Estado</span>
                        </div>

                        <!-- Separador -->
                        <hr class="separador-card">

                        <!-- Detalles de la tarea -->
                        <div class="task-details">
                            <div class="task-detail">
                                <i class="fas fa-graduation-cap"></i>
                                <strong>Curso:</strong> 
                                <span th:text="${mapa.tarea.curso != null ? mapa.tarea.curso.nombre : 'Sin curso'}">Nombre del curso</span>
                            </div>

                            <div class="task-detail">
                                <i class="fas fa-calendar-alt"></i>
                                <strong>Entrega:</strong> 
                                <span th:text="${mapa.tarea.fechaEntrega}">Fecha de entrega</span>
                            </div>

                            <!-- NUEVO: Modalidad -->
                            <div class="task-detail">
                                <i class="fas fa-users"></i>
                                <strong>Modalidad:</strong> 
                                <span th:text="${mapa.tarea.modalidad}">Modalidad</span>
                            </div>

                            <div class="task-detail">
                                <i class="fas fa-percent"></i>
                                <strong>Valor:</strong>
                                <span th:text="${mapa.tarea.porcentaje + '%'}">0%</span>
                            </div>
                            
                            <div class="task-detail">
                                <i class="fas fa-star"></i>
                                <strong>Nota obtenida:</strong>
                                <span th:text="${mapa.tarea.notaObtenida != null ? mapa.tarea.notaObtenida : 'No asignada'}"
                                      th:style="${mapa.tarea.notaObtenida != null} ? 'color:' + (${mapa.tarea.notaObtenida >= 70} ? 'green' : 'red') : ''">
                                    0
                                </span>
                            </div>

                            <!-- Tiempo restante destacado -->
                            <div class="tiempo-restante">
                                <i class="fas fa-clock"></i>
                                <strong>Tiempo restante:</strong> 
                                <span th:text="${mapa.dias + 'd ' + mapa.horas + 'h ' + mapa.minutos + 'm'}">Tiempo</span>
                            </div>
                        </div>


                        <!-- Acciones -->
                        <div class="custom-card-actions">
                            <a th:href="@{/tareas/ver/{id}(id=${mapa.tarea.id})}" class="custom-card-btn btn-ver">
                                <i class="fas fa-eye"></i> Ver
                            </a>
                            <a th:href="@{/tareas/editar/{id}(id=${mapa.tarea.id})}" class="custom-card-btn btn-editar">
                                <i class="fas fa-edit"></i> Editar
                            </a>
                            <a th:href="@{/tareas/eliminar/{id}(id=${mapa.tarea.id})}" 
                               class="custom-card-btn btn-eliminar"
                               onclick="return confirm('¿Está seguro de eliminar esta tarea?');">
                                <i class="fas fa-trash"></i> Eliminar
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Botón Flotante -->
        <button class="floating-add-btn" type="button" onclick="window.location.href='/tareas/form'" title="Agregar nueva tarea">
            <i class="fas fa-plus"></i>
        </button>


        <!-- Footer -->
        <div th:replace="fragments/footer :: footer"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            document.querySelectorAll('.custom-card-btn').forEach(btn => {
                btn.addEventListener('mouseenter', function () {
                    this.style.transform = 'translateY(-1px)';
                });
                btn.addEventListener('mouseleave', function () {
                    this.style.transform = 'translateY(0)';
                });
            });

            document.querySelectorAll('.custom-card').forEach(card => {
                card.addEventListener('mouseenter', function () {
                    this.style.transform = 'translateY(-5px)';
                    this.style.boxShadow = '0 10px 20px rgba(0,0,0,0.1)';
                });
                card.addEventListener('mouseleave', function () {
                    this.style.transform = 'translateY(0)';
                    this.style.boxShadow = '0 4px 8px rgba(0,0,0,0.05)';
                });
            });
        </script>
    </body>
</html>
