<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReminderU — Ver Tarea</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/estilos.css(v=${#dates.createNow().time})}" href="/css/estilos.css">

  <style>
    .page-body { padding: 0 1rem 3rem; max-width: 720px; margin: 0 auto; }
    @media (min-width: 768px) { .page-body { padding: 0 1.5rem 3rem; } }

    .ru-breadcrumb {
      display: flex; align-items: center; gap: .5rem;
      font-size: .8rem; color: var(--navy-muted);
      padding: 1.25rem 0 .25rem; flex-wrap: wrap;
    }
    .ru-breadcrumb a { color: var(--indigo); text-decoration: none; font-weight: 600; }
    .ru-breadcrumb a:hover { text-decoration: underline; }
    .ru-breadcrumb-sep { opacity: .4; }

    .tarea-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.75rem;
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.5rem;
      position: relative; overflow: hidden;
    }
    .tarea-hero::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 5px; border-radius: 5px 0 0 5px;
    }
    .tarea-hero.pendiente::before  { background: var(--amber); }
    .tarea-hero.entregada::before  { background: var(--emerald); }
    .tarea-hero.vencida::before    { background: var(--rose); }

    .tarea-hero-title {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 800; letter-spacing: -.3px;
      margin-bottom: .75rem;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: .75rem; margin-top: 1.25rem;
    }
    .meta-item {
      background: var(--bg); border-radius: var(--radius-sm);
      padding: .7rem 1rem;
    }
    .meta-label { font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--navy-muted); margin-bottom: .2rem; }
    .meta-value { font-size: .9rem; font-weight: 600; color: var(--navy); }

    .countdown-box {
      display: flex; align-items: center; justify-content: center;
      gap: .5rem; padding: .85rem 1.25rem;
      border-radius: var(--radius-md); font-size: 1rem; font-weight: 700;
      margin-bottom: 1.5rem; flex-wrap: wrap; text-align: center;
    }
    .countdown-box.urgente  { background: var(--rose-light);   color: #9f1239; border: 1px solid #fda4af; }
    .countdown-box.proximo  { background: var(--amber-light);  color: #92400e; border: 1px solid #fcd34d; }
    .countdown-box.ok       { background: var(--emerald-light);color: #065f46; border: 1px solid #6ee7b7; }
    .countdown-box.entregada{ background: var(--indigo-light); color: #3730a3; border: 1px solid #a5b4fc; }

    .section-label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--navy-muted); margin-bottom: .75rem;
    }

    .desc-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
      box-shadow: var(--shadow-sm); margin-bottom: 1.5rem;
      font-size: .92rem; line-height: 1.7; color: var(--navy);
      white-space: pre-line;
    }

    .actions-row {
      display: flex; gap: .75rem; flex-wrap: wrap; margin-top: 1rem;
    }
    @media (max-width: 480px) {
      .actions-row { flex-direction: column; }
      .actions-row a, .actions-row form, .actions-row button { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>
  <div th:replace="fragments/header :: HeaderPagina"></div>

  <main>
    <div class="page-body">

      <!-- Breadcrumb -->
      <nav class="ru-breadcrumb">
        <a th:href="@{/}">Inicio</a>
        <span class="ru-breadcrumb-sep">›</span>
        <a th:href="@{/tareas}">Tareas</a>
        <span class="ru-breadcrumb-sep">›</span>
        <span th:text="${tarea.titulo}">Tarea</span>
      </nav>

      <!-- Countdown -->
      <div class="countdown-box"
           th:classappend="${tarea.estado.name() == 'ENTREGADA'} ? 'entregada' :
                           (${diasRestantes} < 0 ? 'urgente' :
                           (${diasRestantes} <= 2 ? 'urgente' :
                           (${diasRestantes} <= 4 ? 'proximo' : 'ok')))">
        <span th:if="${tarea.estado.name() == 'ENTREGADA'}">✅ Tarea entregada</span>
        <span th:if="${tarea.estado.name() != 'ENTREGADA' and diasRestantes < 0}">
          ⚠️ Venció hace <b th:text="${diasRestantes * -1}">0</b> día(s)
        </span>
        <span th:if="${tarea.estado.name() != 'ENTREGADA' and diasRestantes == 0}">
          🔴 ¡Vence hoy!
        </span>
        <span th:if="${tarea.estado.name() != 'ENTREGADA' and diasRestantes > 0}">
          ⏳ Vence en <b th:text="${diasRestantes}">0</b> día(s)
        </span>
      </div>

      <!-- Hero -->
      <div class="tarea-hero"
           th:classappend="${tarea.estado.name() == 'ENTREGADA'} ? 'entregada' :
                           (${tarea.estado.name() == 'VENCIDA'} ? 'vencida' : 'pendiente')">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
          <div class="tarea-hero-title" th:text="${tarea.titulo}">Título</div>
          <div class="d-flex gap-2 flex-wrap">
            <span class="ru-badge"
                  th:classappend="${tarea.estado.name() == 'ENTREGADA'} ? 'ru-badge-emerald' :
                                  (${tarea.estado.name() == 'VENCIDA'} ? 'ru-badge-rose' : 'ru-badge-amber')"
                  th:text="${tarea.estado.name() == 'ENTREGADA'} ? '✅ Entregada' :
                            (${tarea.estado.name() == 'VENCIDA'} ? '⚠️ Vencida' : '⏳ Pendiente')">
              Estado
            </span>
            <span class="ru-badge ru-badge-indigo"
                  th:if="${tarea.prioridad != null}"
                  th:text="${tarea.prioridad.name() == 'ALTA'} ? '🔴 Alta' :
                            (${tarea.prioridad.name() == 'MEDIA'} ? '🟡 Media' : '🟢 Baja')">
              Prioridad
            </span>
          </div>
        </div>

        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Curso</div>
            <div class="meta-value" th:text="${tarea.curso.nombre}">—</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Fecha entrega</div>
            <div class="meta-value"
                 th:text="${tarea.fechaEntrega != null} ? ${#temporals.format(tarea.fechaEntrega, 'dd MMM yyyy')} : '—'">—</div>
          </div>
          <div class="meta-item" th:if="${tarea.horaEntrega != null}">
            <div class="meta-label">Hora límite</div>
            <div class="meta-value" th:text="${#temporals.format(tarea.horaEntrega, 'HH:mm')}">—</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Valor</div>
            <div class="meta-value" th:text="${tarea.porcentaje} + '%'">—</div>
          </div>
          <div class="meta-item" th:if="${tarea.modalidad != null}">
            <div class="meta-label">Modalidad</div>
            <div class="meta-value"
                 th:text="${tarea.modalidad.name() == 'GRUPAL'} ? '👥 Grupal' : '👤 Individual'">—</div>
          </div>
          <div class="meta-item" th:if="${tarea.notaObtenida != null}">
            <div class="meta-label">Nota obtenida</div>
            <div class="meta-value"
                 th:style="${tarea.notaObtenida >= 70} ? 'color:var(--emerald)' : 'color:var(--rose)'"
                 th:text="${tarea.notaObtenida} + ' / 100'">—</div>
          </div>
        </div>
      </div>

      <!-- Descripción -->
      <p class="section-label">📝 Descripción</p>
      <div class="desc-card" th:text="${tarea.descripcion}">Sin descripción.</div>

      <!-- Registrar nota -->
      <div th:if="${tarea.estado.name() == 'ENTREGADA'}" class="mb-4">
        <p class="section-label">🎯 Nota obtenida</p>
        <div class="ru-card ru-card-body">
          <form th:action="@{/tareas/nota/{id}(id=${tarea.id})}" method="post"
                class="d-flex gap-2 align-items-end flex-wrap">
            <div>
              <label class="ru-form-label">Nota (0–100)</label>
              <input type="number" name="nota" class="ru-form-control" style="max-width:140px;"
                     min="0" max="100" step="0.01"
                     th:value="${tarea.notaObtenida}" placeholder="Ej: 85">
            </div>
            <button type="submit" class="ru-btn ru-btn-primary">💾 Guardar nota</button>
          </form>
        </div>
      </div>

      <!-- Acciones -->
      <div class="actions-row">
        <a th:href="@{/tareas/editar/{id}(id=${tarea.id})}" class="ru-btn ru-btn-ghost">✏️ Editar</a>

        <form th:if="${tarea.estado.name() != 'ENTREGADA'}"
              th:action="@{/tareas/completar/{id}(id=${tarea.id})}" method="post">
          <button type="submit" class="ru-btn ru-btn-success">✅ Marcar como entregada</button>
        </form>

        <a th:href="@{/cursos/ver/{id}(id=${tarea.curso.id})}" class="ru-btn ru-btn-ghost">
          📚 Ir al curso
        </a>

        <a th:href="@{/tareas/eliminar/{id}(id=${tarea.id})}"
           class="ru-btn ru-btn-danger"
           onclick="return confirm('¿Eliminar esta tarea?')">🗑 Eliminar</a>
      </div>

    </div>
  </main>

  <div th:replace="fragments/footer :: FooterPagina"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
