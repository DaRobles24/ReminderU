<header th:fragment="HeaderPagina" class="w-100">  
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark w-100">  
        <div class="container-fluid">  
            <!-- Brand a la izquierda -->  
            <a class="navbar-brand" th:href="@{/perfil/home}">ReminderU</a>  
 
            <!-- Links centrados -->  
            <div class="mx-auto">  
                <ul class="navbar-nav d-flex flex-row gap-3">  
                    <li class="nav-item">  
                        <a class="nav-link" th:href="@{/cursos}">Cursos</a>  
                    </li>  
                    <li class="nav-item dropdown">  
                        <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">Tareas</a>  
                        <ul class="dropdown-menu">  
                            <li><a class="dropdown-item" th:href="@{/tareas/form}">Agregar Tarea</a></li>  
                            <li><a class="dropdown-item" th:href="@{/tareas}">Ver Tareas Pendientes</a></li>  
                        </ul>  
                    </li>  
                </ul>  
            </div>  
 
            <!-- Perfil a la derecha -->  
            <div class="dropdown">  
                <a href="#" class="d-block" id="perfilDropdown" data-bs-toggle="dropdown" aria-expanded="false">  
                    <!-- Foto de Google (URL externa) -->
                    <img th:if="${usuario != null && usuario.fotoPerfil != null && usuario.fotoPerfil.startsWith('http')}"
                         th:src="${usuario.fotoPerfil}"
                         alt="Perfil"   
                         class="rounded-circle border border-light"  
                         style="width:40px; height:40px; object-fit:cover;">
                    
                    <!-- Foto local (desde servidor) -->
                    <img th:if="${usuario != null && usuario.fotoPerfil != null && !usuario.fotoPerfil.startsWith('http')}"
                         th:src="@{${usuario.fotoPerfil}}"
                         alt="Perfil"   
                         class="rounded-circle border border-light"  
                         style="width:40px; height:40px; object-fit:cover;">
                    
                    <!-- Sin foto (placeholder) -->
                    <img th:if="${usuario == null || usuario.fotoPerfil == null}"
                         src="https://via.placeholder.com/40"   
                         alt="Perfil"   
                         class="rounded-circle border border-light"  
                         style="width:40px; height:40px;">  
                </a>  
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="perfilDropdown">  
                    <li>  
                        <a class="dropdown-item" th:href="@{/perfil/ver}">👤 Ver perfil</a>  
                    </li> 
                    <li> 
                        <a class="dropdown-item" th:href="@{/perfil/editar}">⚙️ Configuración</a> 
                    </li> 
                    <li><hr class="dropdown-divider"></li>  
                    <li> 
                        <a class="dropdown-item" th:href="@{/logout}"  
                           onclick="event.preventDefault(); document.getElementById('logout-form').submit();"> 
                            🚪 Cerrar sesión 
                        </a> 
                    </li>  
                </ul>  
            </div>  
        </div>  
    </nav>  
 
    <!-- Form oculto para logout seguro --> 
    <form id="logout-form" th:action="@{/logout}" method="post" style="display: none;"> 
        <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}"/> 
    </form> 
</header>
