<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReminderU</title>

  <!-- Bootstrap CSS (una sola vez) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tu CSS (sirve desde src/main/resources/static/css/estilos.css) -->
  <!-- th:href respeta el context path si tu app no corre en raíz -->
  <link rel="stylesheet" th:href="@{/css/estilos.css(v=${#dates.createNow().time})}" href="/css/estilos.css">
</head>

<body class="reminder-app">
  <!-- Header (fragmento sin <html>/<head>/<body> adentro) -->
  <div th:replace="fragments/header :: HeaderPagina"></div>

  <!-- Main -->
  <main class="container mt-5">
    <h1>Bienvenido a ReminderU</h1>
    <p>Olvidate de las Sorpresas...</p>

      <div th:replace="fragments/Body :: CuerpoPagina"></div>
  
  </main>

  <!-- Footer (sin anidar <footer> sobre otro footer) -->
  <div th:replace="fragments/footer :: FooterPagina"></div>

  <!-- Bootstrap JS (una sola vez) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
